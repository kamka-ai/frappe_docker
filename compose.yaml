x-customizable-image: &customizable_image
  build:
    context: .
    dockerfile: images/layered/Containerfile
    args:
      FRAPPE_PATH: https://github.com/frappe/frappe
      FRAPPE_BRANCH: version-15
      PYTHON_VERSION: 3.11.6
      NODE_VERSION: 20.19.2
      APPS_JSON_BASE64: 
  restart: unless-stopped

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [ *depends_on_configurator, *customizable_image ]
  volumes:
    - sites:/home/frappe/frappe-bench/sites

services:
  db:
    image: mariadb:11.8
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  configurator:
    <<: *backend_defaults
    platform: linux/amd64
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt; bench set-config -g db_host $$DB_HOST; bench set-config -gp db_port $$DB_PORT; bench set-config -g redis_cache "redis://$$REDIS_CACHE"; bench set-config -g redis_queue "redis://$$REDIS_QUEUE"; bench set-config -g redis_socketio "redis://$$REDIS_QUEUE"; bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: 9000
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: on-failure

  backend:
    <<: *backend_defaults
    platform: linux/amd64

  frontend:
    <<: *customizable_image
    platform: linux/amd64
    command:
      - nginx-entrypoint.sh
    expose:
      - "8080"
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
      - websocket

  websocket:
    <<: [ *depends_on_configurator, *customizable_image ]
    platform: linux/amd64
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-short:
    <<: *backend_defaults
    platform: linux/amd64
    command: bench worker --queue short,default

  queue-long:
    <<: *backend_defaults
    platform: linux/amd64
    command: bench worker --queue long,default,short

  scheduler:
    <<: *backend_defaults
    platform: linux/amd64
    command: bench schedule

  create-site:
    <<: *backend_defaults
    platform: linux/amd64
    restart: "no"
    command:
      - bash
      - -c
      - |
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export SITE=${SITE_NAME:-erp.example.com};
        export ROOT_PASS=${DB_PASSWORD:-changeme};
        export ADMIN_PASS=${ADMIN_PASSWORD:-admin};
        # Test if site exists AND db connection works
        if bench --site $$SITE execute frappe.ping_primary_replica > /dev/null 2>&1; then
          echo "Site $$SITE is healthy, skipping creation.";
        else
          echo "Site $$SITE missing or DB unreachable. Recreating...";
          bench drop-site $$SITE --force --mariadb-root-password $$ROOT_PASS 2>/dev/null || true;
          bench new-site $$SITE \
            --mariadb-root-password $$ROOT_PASS \
            --admin-password $$ADMIN_PASS \
            --install-app erpnext \
            --no-mariadb-socket;
          echo "Site $$SITE created successfully with DB user.";
        fi

volumes:
  sites:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ubuntu/frappe-test/sites
  db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ubuntu/frappe-test/db-data
  redis-queue-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ubuntu/frappe-test/redis-data
